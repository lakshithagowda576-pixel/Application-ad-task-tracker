<div class="container mx-auto p-4 max-w-4xl">
  <h2 class="text-2xl font-bold mb-6 text-gray-800">Application Tracking Dashboard</h2>

  <div class="bg-white p-6 rounded-lg shadow-md mb-8">
    <h3 class="text-lg font-semibold mb-4 text-gray-700">{{ editingId ? 'Edit Entry' : 'Add New Entry' }}</h3>
    <form (ngSubmit)="saveItem()" class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <input type="text" [(ngModel)]="newItem.title" name="title" placeholder="Job Title / Role" required class="border p-2 rounded w-full">
      <input type="text" [(ngModel)]="newItem.company" name="company" placeholder="Company Name" required class="border p-2 rounded w-full">
      <select [(ngModel)]="newItem.status" name="status" class="border p-2 rounded w-full">
        <option value="Pending">Pending</option>
        <option value="Interviewing">Interviewing</option>
        <option value="Offered">Offered</option>
        <option value="Rejected">Rejected</option>
      </select>
      <input type="text" [(ngModel)]="newItem.notes" name="notes" placeholder="Notes (optional)" class="border p-2 rounded w-full">
      <div class="md:col-span-2 flex gap-2 justify-end">
        <button type="button" *ngIf="editingId" (click)="resetForm()" class="bg-gray-400 text-white px-4 py-2 rounded transition hover:bg-gray-500">Cancel</button>
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded transition hover:bg-blue-700">Submit</button>
      </div>
    </form>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div *ngFor="let item of items" class="bg-white p-4 rounded-lg shadow border-l-4 border-blue-500 flex flex-col justify-between">
      <div>
        <div class="flex justify-between items-start">
          <h4 class="text-xl font-bold text-gray-800">{{ item.title }}</h4>
          <span class="text-xs px-2 py-1 rounded-full bg-blue-100 text-blue-800 font-medium">{{ item.status }}</span>
        </div>
        <p class="text-sm text-gray-600 font-semibold mt-1">{{ item.company }}</p>
        <p class="text-gray-500 text-sm mt-2 italic" *ngIf="item.notes">"{{ item.notes }}"</p>
      </div>
      <div class="mt-4 pt-2 border-t flex justify-end gap-3">
        <button (click)="editItem(item)" class="text-sm text-amber-600 hover:underline">Edit</button>
        <button (click)="deleteItem(item._id)" class="text-sm text-red-600 hover:underline">Delete</button>
      </div>
    </div>
  </div>
</div>
